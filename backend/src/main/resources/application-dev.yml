spring:
  datasource:
    url: jdbc:mysql://localhost:3307/crypto_address_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: crypto_user
    password: <YOUR_DB_PASSWORD>
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  flyway:
    enabled: false

logging:
  level:
    com.crypto: DEBUG
    org.springframework.security: DEBUG

app:
  jwt:
    secret: <YOUR_DEV_JWT_SECRET>
    expiration: 86400000
    refresh-expiration: 604800000