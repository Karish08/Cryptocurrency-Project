spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:crypto_address_system}?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  
  flyway:
    enabled: true

server:
  port: 8080
  compression:
    enabled: true

logging:
  level:
    com.crypto: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    name: /app/logs/crypto-address-system.log

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000