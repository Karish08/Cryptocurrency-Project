spring:
  application:
    name: crypto-address-system
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:mysql://localhost:3306/crypto_address_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:<YOUR_DB_USERNAME>}
    password: ${DB_PASSWORD:<YOUR_DB_PASSWORD>}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500, expireAfterAccess=30m
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    max-threads: 200
    min-spare-threads: 10

app:
  jwt:
    secret: ${JWT_SECRET:<YOUR_JWT_SECRET>}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  
  blockchain:
    etherscan:
      api-key: ${ETHERSCAN_API_KEY:}
      base-url: https://api.etherscan.io/api
    bscscan:
      api-key: ${BSCSCAN_API_KEY:}
      base-url: https://api.bscscan.com/api
    infura:
      project-id: ${INFURA_PROJECT_ID:}
      project-secret: ${INFURA_PROJECT_SECRET:}
  
  coin-gecko:
    api-key: ${COINGECKO_API_KEY:}
    base-url: https://api.coingecko.com/api/v3

logging:
  level:
    com.crypto: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    org.hibernate: WARN
    org.springframework.security: INFO
  file:
    name: logs/crypto-address-system.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha