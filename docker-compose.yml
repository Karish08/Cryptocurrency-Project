
services:
  mysql:
    image: mysql:8.0
    container_name: crypto-mysql
    environment:
      MYSQL_ROOT_PASSWORD: <YOUR_MYSQL_ROOT_PASSWORD>
      MYSQL_DATABASE: crypto_address_system
      MYSQL_USER: crypto_user
      MYSQL_PASSWORD: <YOUR_MYSQL_PASSWORD>
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p<YOUR_MYSQL_ROOT_PASSWORD>"]
      timeout: 20s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - crypto-network
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: crypto_address_system
      DB_USERNAME: crypto_user
      DB_PASSWORD: <YOUR_DB_PASSWORD>
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-<YOUR_JWT_SECRET>}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crypto-network
    volumes:
      - backend-logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-frontend
    environment:
      REACT_APP_API_URL: http://backend:8080/api
      REACT_APP_WS_URL: ws://backend:8080/ws
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - crypto-network

volumes:
  mysql-data:
  redis-data:
  backend-logs:

networks:
  crypto-network:
    driver: bridge
